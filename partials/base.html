<!-- View: Base -->
<div id="view-base" class="view-section">
    <div class="panel">
        <h2>🏰 基地物资</h2>
        <div id="resource-display" style="font-size:13px;line-height:1.9;"></div>
    </div>

    <div class="panel" id="player-equip-panel">
        <!-- 英雄与装备合并为左右分栏 -->
        <div style="display: flex; margin-bottom: 4px;">

            <!-- 左侧：英雄属性 -->
            <div style="flex: 1; display: flex; flex-direction: column; padding-right: 8px;">
                <!-- 标题栏：英雄 + 等级 + 升级按钮 -->
                <div
                    style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px;">
                    <div style="display: flex; align-items: baseline; gap: 4px;">
                        <h3 style="color:#a8b2d1; margin:0;">🦸 英雄</h3>
                        <span id="player-level-info" style="font-size:10px; color:#888;"></span>
                    </div>
                    <button onclick="player.levelUp()" id="btn-lvl-up"
                        style="width:auto; margin:0; padding:2px 6px; font-size:10px;">⬆️ 升级</button>
                </div>

                <!-- HP 血条移到这里 -->
                <div class="bar-wrap" id="base-player-hp-wrap" style="margin: 0 0 8px 0;">
                    <div id="base-player-hp" class="bar-inner hp-bar"></div>
                    <div id="base-player-hp-txt" class="bar-text">-</div>
                </div>

                <!-- 基础属性 -->
                <div id="player-display-stats" style="font-size:11px; line-height:1.5; color:#ccc;"></div>
            </div>

            <!-- 右侧：装备栏 -->
            <div
                style="flex: 1.1; border-left: 1px solid var(--border); padding-left: 8px; display: flex; flex-direction: column;">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-bottom: 6px;">
                    <h3 style="color:#a8b2d1; margin:0;">⚔️ 装备</h3>
                    <button onclick="ui.openInventoryModal()"
                        style="width:auto; padding:2px 8px; font-size:10px; background:#b05231; margin:0;">🎒
                        背包</button>
                </div>
                <!-- 紧凑型装备槽 -->
                <div class="equip-grid-compact" id="equip-slots"></div>
            </div>
        </div>

        <button onclick="devCheat()" id="dev-cheat-btn" style="background:#822faf; margin-top:4px;">🛠️ 测试：+1级 &
            +50金币</button>
        <!-- 临时测试按钮：重置为初始状态，调试用，正式发布前记得删掉 -->
        <button onclick="save.resetToInitial()" id="dev-reset-btn" style="background:#7a1f1f; margin-top:4px;">🧪 测试：重置存档</button>
    </div>

    <div class="panel" style="background:transparent; border:none; padding:0;">
        <div class="btn-row">
            <button onclick="ui.openAreaModal()" style="height:52px; font-size:15px; background:#b05231;">🗺️
                探索</button>
            <button onclick="ui.openBuildingModal()"
                style="height:52px; font-size:15px; background:#2d6a4f;">🏗️ 建筑</button>
        </div>
    </div>
</div>

<!-- Area modal -->
<div id="area-overlay" class="modal-overlay-shared">
    <div class="modal-box-shared">
        <h3 style="margin:0 0 10px;">🗺️ 选择逆境</h3>
        <div id="area-list"></div>
        <button onclick="ui.closeAreaModal()" style="background:#333;margin-top:8px;">关闭</button>
    </div>
</div>

<!-- Building modal -->
<div id="building-overlay" class="modal-overlay-shared">
    <div class="modal-box-shared">
        <h3 style="margin:0 0 10px;">🏗️ 基地建设</h3>
        <div id="building-list"></div>
        <button onclick="ui.closeBuildingModal()" style="background:#333;margin-top:8px;">关闭</button>
    </div>
</div>
