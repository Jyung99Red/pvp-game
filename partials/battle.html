<!-- View: Battle -->
<div id="view-battle" class="view-section hidden">
    <!-- 顶部：敌人信息面板 -->
    <div class="panel" style="margin-bottom: 8px;">
        <div class="flex-row">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div id="enemy-sprite" class="character-node">👹</div>
                <h3 id="enemy-name">敌人</h3>
            </div>
            <span id="enemy-status" style="color:#f4a261;font-size:12px;"></span>
        </div>
        <div class="bar-wrap" id="enemy-hp-wrap">
            <div id="enemy-hp" class="bar-inner hp-bar"></div>
            <div id="enemy-hp-txt" class="bar-text">-</div>
        </div>
        <!-- 蓄力条 -->
        <div class="enemy-action-row">
            <div class="enemy-charge-bar-wrap">
                <div id="enemy-action" class="bar-inner action-bar"></div>
                <div id="enemy-action-txt" class="bar-text"></div>
            </div>
        </div>
    </div>

    <!-- 中部：战斗交互区域 (Battle Arena) -->
    <div class="battle-arena" id="battle-arena">
        <div class="arena-top">
            <!-- 敌方攻击节点 -->
            <div class="weapon-node" id="enemy-weapon-node"></div>
        </div>

        <div class="arena-bottom" id="player-action-nodes">
            <!-- 我方动作节点 (可以直接点击，未来可改为滑动触发) -->
            <div class="player-node" id="node-left"
                onpointerdown="battle.playerAction('left')"
                onpointerup="battle.weaponRelease('left')"
                onpointerleave="battle.weaponRelease('left')"></div>
            <div class="player-node" id="node-right"
                onpointerdown="battle.playerAction('right')"
                onpointerup="battle.weaponRelease('right')"
                onpointerleave="battle.weaponRelease('right')"></div>
        </div>
    </div>

    <!-- 底部：英雄信息面板 -->
    <div class="panel" style="margin-bottom: 8px;">
        <div class="flex-row">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div id="player-sprite" class="character-node">🦸</div>
                <h3 style="margin:0;">英雄</h3>
            </div>
            <div>
                <span id="player-guard-icon" style="font-size:20px;display:none;"></span>
                <span id="player-sp" style="color:#48cae4;font-weight:bold;font-size:14px;">☆☆☆</span>
            </div>
        </div>

        <div id="player-buff-display"></div>
        <div class="bar-wrap" id="player-hp-wrap">
            <div id="player-hp" class="bar-inner hp-bar"></div>
            <div id="player-hp-txt" class="bar-text">-</div>
        </div>
        <div class="bar-wrap">
            <div id="player-action-progress" class="bar-inner attack-bar"></div>
            <div id="player-action-txt" class="bar-text">行动力: 3/3</div>
        </div>

        <!-- 原有的战斗按钮保留作为辅助或快捷键 -->
        <div id="battle-actions" style="margin-top:12px;">
            <div class="btn-row" style="margin-bottom:7px;">
                <button id="btn-act-left" style="height:40px;"
                    onpointerdown="battle.playerAction('left')"
                    onpointerup="battle.weaponRelease('left')"
                    onpointerleave="battle.weaponRelease('left')">左手</button>
                <button id="btn-act-right" style="height:40px;"
                    onpointerdown="battle.playerAction('right')"
                    onpointerup="battle.weaponRelease('right')"
                    onpointerleave="battle.weaponRelease('right')">右手</button>
            </div>
            <div class="btn-row">
                <button id="btn-skill" style="background:#0077b6;">✨ 技能 (-3⭐)</button>
                <button id="btn-flee" style="background:#780000;flex:0.5;"></button>
            </div>
        </div>

        <div id="post-battle-actions" class="hidden" style="margin-top:12px;">
            <div class="btn-row">
                <button id="btn-continue" style="background:#2a9d8f;height:48px;">➡️ 继续深入</button>
                <button id="btn-retreat-safe" style="background:#e76f51;height:48px;">🏕️ 携宝回城</button>
            </div>
        </div>
    </div>

    <div id="log" style="height:90px;"></div>
</div>
