<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>放置地牢</title>
    <!-- 引入独立出来的 CSS 样式 -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header" id="time-display">加载中...</div>

    <div class="content-area">
        <div id="mount-base"></div>

        <div id="mount-pve-battle"></div>

        <div id="inventory-overlay">
            <div id="inventory-box">
                <div class="modal-header">
                    <h3>🎒 个人背包</h3>
                    <span id="inv-count" class="modal-subtle">0/20</span>
                </div>
                <div class="inv-grid-wrap">
                    <div class="inv-grid" id="inventory-grid"></div>
                </div>
            </div>
        </div>

        <!-- Item info modal -->
        <div id="modal-overlay">
            <div id="modal-box">
                <h3 id="modal-title"></h3>
                <div class="modal-stat" id="modal-stats"></div>
                <div id="modal-effects"></div>
                <div class="modal-desc" id="modal-desc"></div>
                <div class="modal-btns" id="modal-btns"></div>
            </div>
        </div>

        <!-- Smithy modal -->
        <div id="smithy-overlay">
            <div id="smithy-box">
                <h3 style="margin:0 0 10px;">🔨 铁匠铺</h3>
                <div id="smithy-recipe-list"></div>
                <button onclick="ui.closeSmithyModal()" style="background:#333;margin-top:4px;">关闭</button>
            </div>
        </div>

        <div id="mount-pvp-room"></div>

        <div id="mount-pvp-battle"></div>

        </div>

        <div class="nav-bar">
            <button class="nav-btn active" id="tab-base" onclick="ui.switchTab('base')">🏕️ 基地</button>
            <button class="nav-btn" id="tab-battle" onclick="ui.switchTab('battle')">⚔️ 战斗</button>
            <button class="nav-btn" id="tab-pvp-room" onclick="ui.switchTab('pvp-room')">⚔️ PVP</button>
        </div>

        <!-- 引入所有的 JS 文件 -->

        <script src="data.js"></script>
        <script src="effects.js"></script>
        <script src="save.js"></script>
        <script src="player.js"></script>
        <script src="tick.js"></script>
        <script src="fx.js"></script>
        <script src="combat_resolver.js"></script>

        <script src="icons.js"></script>
        <script src="ui.js"></script>
        <script src="ui_pve.js"></script>
        <script src="pve_logic.js"></script>

        <!-- PVP and external dependencies -->
        <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
        <script src="pvp_logic.js"></script>
        <script src="pvp_net.js"></script>
        <script src="pvp_room.js"></script>
        <script src="ui_pvp.js"></script>

        <!-- 启动游戏：先把拆分出去的 view 片段 fetch 回来注入，再跑 ui.init() -->
        <script>
            window.onload = async () => {
                const mounts = ['base', 'pve-battle', 'pvp-room', 'pvp-battle'];
                await Promise.all(mounts.map(async id => {
                    const el = document.getElementById('mount-' + id);
                    el.outerHTML = await fetch('partials/' + id + '.html').then(r => r.text());
                }));
                ui.init();
            };
        </script>

</body>

</html>
